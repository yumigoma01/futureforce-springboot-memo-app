<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${memo.id} != null ? 'メモ編集' : 'メモ作成'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 class="app-title" th:text="${memo.id} != null ? 'メモ編集' : 'メモ作成'"></h1>
            <a th:href="${memo.id} != null ? @{|/memo/detail/${memo.id}|}  : @{/memo}" class="btn btn-outline"><i class="ri-arrow-left-line"></i> 戻る</a>
        </div>

        <div class="note-form-card">
            <form th:action="${memo.id} != null ? @{|/memo/update/${memo.id}|} : @{/memo/create}" th:object="${memo}" method="post">        
                <div class="form-group">
                    <label>タイトル：</label>
                    <input type="text" th:field="*{title}">
                    <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error-message"></div>
                </div>

	            <style>
					.priority-selection input:checked + label {
						border-color:#000 !important;
						opacity: 1 !important;
						transform: scale(1.05);
					}
				</style>
	            <div class="form-group">
					<label>優先度</label>
					<div class ="priority-selection d-flex gap-3 mt-2">
						<div th:each="p:${priorities}" class="form-check">
							<input type="radio"
							       th:field="*{priority}"
					               th:value="${p}"
				                   th:id="${'priority-' + p}" 
				                   class="form-check-input"
				                   style="display: none;">
				            <label th:for="${'priority-' + p}" 
				                   th:text="${p.label}" 
				                   th:class="'note-badge ' + ${p.name().toLowerCase()}"
				                   style="cursor: pointer; display: inline-block; border: 1px solid transparent; opacity: 0.6; transition: 0.2s; margin:0;">
				            </label>
				         </div>
					</div>
				</div>				

                <div class="form-group">
                    <label>内容：</label>
                    <textarea th:field="*{content}"></textarea>
                    <div th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="error-message"></div>
                </div>

                <div class="form-button-container">
                    <button type="submit" class="btn btn-primary" th:text="${memo.id} != null ? '更新' : '作成'">作成</button>
                </div>
            </form>
        </div>
    </div>
    <script th:src="@{/js/common.js}"></script>
</body>

</html>
